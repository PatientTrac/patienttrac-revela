name: PatientTrac Revela — Deploy to Netlify

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy target'
        required: true
        default: 'production'
        type: choice
        options: [production, staging]

jobs:
  deploy:
    name: Deploy to Netlify (${{ github.event.inputs.environment || 'production' }})
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests before deploy
        run: npm run test
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY_TEST }}

      - name: Build for production
        run: npm run build
        env:
          VITE_APP_ENV: production
          VITE_APP_NAME: PatientTrac Revela
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: './dist'
          functions-dir: './netlify/functions'
          production-branch: main
          production-deploy: ${{ github.ref == 'refs/heads/main' }}
          deploy-message: |
            Deploy from GitHub Actions
            Commit: ${{ github.sha }}
            By: ${{ github.actor }}
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Post deploy notification
        if: success()
        run: |
          echo "✅ PatientTrac Revela deployed successfully"
          echo "Commit: ${{ github.sha }}"
          echo "Actor: ${{ github.actor }}"
