[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# 30s required — Fable 5 responses take 15-25s for clinical reasoning tasks
[functions."*"]
  timeout = 30

# ── SPA routing ───────────────────────────────────────────────────────────────
[[redirects]]
  from = "/"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Security headers ──────────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    # Prevent clickjacking — no iframes
    X-Frame-Options = "DENY"

    # Block MIME-type sniffing
    X-Content-Type-Options = "nosniff"

    # HSTS — enforce HTTPS for 2 years, include subdomains, preload
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

    # Only send full referrer on same origin; strip on cross-origin requests
    Referrer-Policy = "strict-origin-when-cross-origin"

    # microphone=(self) required for RevelaAIAssistant Web Speech API voice input
    # camera/geolocation/payment/usb disabled — not needed, reduces attack surface
    Permissions-Policy = "camera=(), microphone=(self), geolocation=(), payment=(), usb=(), interest-cohort=()"

    # Content Security Policy
    # IMPORTANT: api.anthropic.com must NOT be in connect-src — all AI calls go through Netlify Functions only
    # unsafe-inline required for Vite production build (inline event handlers + CSS-in-JS)
    Content-Security-Policy = """
      default-src 'self';
      script-src 'self' 'unsafe-inline';
      connect-src 'self' https://*.supabase.co https://*.supabase.in wss://*.supabase.co https://patienttracforge.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob: https://*.supabase.co https://*.supabase.in https:;
      media-src 'self' blob:;
      worker-src 'self' blob:;
      object-src 'none';
      frame-ancestors 'none';
      base-uri 'self';
      form-action 'self';
      upgrade-insecure-requests;
    """

    # XSS filter (legacy browsers)
    X-XSS-Protection = "1; mode=block"

    # Prevent sensitive pages being cached by CDN / proxies
    Cache-Control = "no-store, max-age=0"
